<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Professional Logic Gate System</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="app-shell">
            <header class="app-header">
                <h1>Simulation Logic Gate </h1>
                <p>Interactive simulator with live output, truth table, and gate
                    details.</p>
            </header>

            <section class="card controls-card">
                <h2>Inputs</h2>
                <div class="inputs" aria-label="Input toggles">
                    <button type="button" id="btnA" class="input-btn">Input-1:
                        OFF</button>
                    <button type="button" id="btnB" class="input-btn">Input-2:
                        OFF</button>
                </div>

                <div class="gate-selector">
                    <p>Select gate:</p>
                    <div id="gateButtons" class="gate-buttons">
                        <button type="button" class="gate-btn"
                            data-gate="AND">AND</button>
                        <button type="button" class="gate-btn"
                            data-gate="OR">OR</button>
                        <button type="button" class="gate-btn"
                            data-gate="NOT">NOT</button>
                        <button type="button" class="gate-btn"
                            data-gate="NAND">NAND</button>
                        <button type="button" class="gate-btn"
                            data-gate="NOR">NOR</button>
                        <button type="button" class="gate-btn"
                            data-gate="XOR">XOR</button>
                    </div>
                </div>

                <div class="actions">
                    <button type="button" id="resetBtn"
                        class="secondary">Reset</button>
                </div>
            </section>

            <section class="card output-card">
                <h2>Output</h2>
                <p id="gateInfo" class="gate-info">Choose a gate and set inputs
                    to view evaluation.</p>
                <div class="gate-figure" id="gateDiagram">
                    <img id="gateDiagramImg" src alt="Gate diagram"
                        class="gate-diagram-img">
                </div>
                <div class="output" id="output">OUTPUT: 0</div>
            </section>

            <section class="card table-card">
                <h2>Truth Table</h2>
                <table id="truthTable" class="truth-table">
                    <thead>
                        <tr><th>Input-1</th><th>Input-2</th><th>Output</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>

        </main>

        <script src="script.js"></script>
    </body>
</html>
